name: AI DevOps Daily Status Email

on:
  schedule:
    # Daily at 8:00 AM EST (13:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  daily-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write token.json
        env:
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: printf '%s' "$TOKEN_JSON" > token.json

      - name: Write token_email.json
        env:
          EMAIL_TOKEN_JSON: ${{ secrets.EMAIL_TOKEN_JSON }}
        run: printf '%s' "$EMAIL_TOKEN_JSON" > token_email.json

      - name: Write .env
        run: |
          printf 'EMAIL_TO=inraby@gmail.com\n' > .env
          printf 'SMTP_USERNAME=inraby@gmail.com\n' >> .env

      - name: Send daily status email
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python send_status_email.py --mode daily

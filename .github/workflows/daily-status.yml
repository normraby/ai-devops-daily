name: AI DevOps Daily Status Email

on:
  schedule:
    # Daily at 8:00 AM EST (13:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  daily-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install python-dotenv

      - name: Write .env
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          printf 'SMTP_PASSWORD=%s\n' "$SMTP_PASSWORD" > .env
          printf 'SMTP_USERNAME=inraby@gmail.com\n' >> .env
          printf 'EMAIL_TO=inraby@gmail.com\n' >> .env

      - name: Send daily status email
        continue-on-error: true
        run: python send_status_email.py --mode daily

name: AI DevOps Daily Upload

on:
  schedule:
    - cron: "0 15 * * 1,4"
  workflow_dispatch:
    inputs:
      video_number:
        description: "Override video number (leave blank for auto)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write client_secret.json
        run: echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json

      - name: Write token.json
        run: echo '${{ secrets.TOKEN_JSON }}' > token.json

      - name: Run pipeline
        run: |
          if [ -n "${{ github.event.inputs.video_number }}" ]; then
            python run_pipeline.py --video ${{ github.event.inputs.video_number }}
          else
            python run_pipeline.py
          fi

      - name: Commit and push tracker.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker.json
          git diff --staged --quiet || git commit -m "chore: update tracker after pipeline run [skip ci]"
          git push

name: AI DevOps Daily Upload

on:
  schedule:
    - cron: "0 15 * * 1,4"
  workflow_dispatch:
    inputs:
      video_number:
        description: "Override video number (leave blank for auto)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg and fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write client_secret.json
        env:
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
        run: printf '%s' "$CLIENT_SECRET_JSON" > client_secret.json

      - name: Write token.json
        env:
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: printf '%s' "$TOKEN_JSON" > token.json

      - name: Write token_email.json
        env:
          EMAIL_TOKEN_JSON: ${{ secrets.EMAIL_TOKEN_JSON }}
        run: printf '%s' "$EMAIL_TOKEN_JSON" > token_email.json

      - name: Write .env
        run: |
          printf 'EMAIL_TO=inraby@gmail.com\n' > .env
          printf 'SMTP_USERNAME=inraby@gmail.com\n' >> .env

      - name: Run pipeline
        id: pipeline
        continue-on-error: true
        run: |
          if [ -n "${{ github.event.inputs.video_number }}" ]; then
            python run_pipeline.py --video ${{ github.event.inputs.video_number }}
          else
            python run_pipeline.py
          fi

      - name: Commit and push tracker.json
        if: steps.pipeline.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker.json
          git diff --staged --quiet || git commit -m "chore: update tracker after pipeline run [skip ci]"
          git push

      - name: Send pipeline status email
        if: always()
        continue-on-error: true
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python send_status_email.py --mode pipeline

      - name: Fail job if pipeline failed
        if: steps.pipeline.outcome != 'success'
        run: exit 1

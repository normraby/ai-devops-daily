name: AI DevOps Daily Upload

on:
  schedule:
    # Monday and Thursday at 10:00 AM EST (15:00 UTC)
    - cron: "0 15 * * 1,4"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write client_secret.json
        run: echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json

      - name: Write token.json
        run: echo '${{ secrets.TOKEN_JSON }}' > token.json

      - name: Run pipeline
        run: python run_pipeline.py

      - name: Commit and push tracker.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker.json
          git diff --staged --quiet || git commit -m "chore: update tracker after pipeline run [skip ci]"
          git push
